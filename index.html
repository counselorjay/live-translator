<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Translator - Counselor Jay</title>
<style>
  body { 
    background-color: #121212; 
    color: #ffffff; 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: flex-start; 
    min-height: 100vh; 
    margin: 0; 
    padding: 6vh 40px; 
    box-sizing: border-box; 
  }
  #main-wrapper {
    max-width: 90%;
    width: 1400px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .controls-row {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-top: 8px;
  }
  #lang-select {
    padding: 6px 12px;
    font-size: 0.75rem;
    background-color: #222;
    color: white;
    border: 1px solid #444;
    border-radius: 20px;
    cursor: pointer;
    outline: none;
    appearance: none;
    text-align: center;
  }
  #lang-select:hover {
    border-color: #4facfe;
  }
  #live-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 3vh;
    border-bottom: 1px solid #222;
    padding-bottom: 5px;
    margin-bottom: 10px;
  }
  #english-text { 
    font-size: 0.6vw; 
    color: #555555; 
    text-align: center; 
    min-height: 0.8vw; 
    font-weight: 400;
  }
  #translated-text { 
    font-size: 0.8vw; 
    font-weight: 500; 
    text-align: center; 
    color: #666666; 
    min-height: 1vw; 
    line-height: 1.2;
    margin-top: 2px;
  }
  #history-container {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 25px;
  }
  .history-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0.55;
    transition: opacity 0.3s;
  }
  .history-item:hover {
    opacity: 0.9;
  }
  .history-en { 
    font-size: 2vw; 
    color: #aaaaaa; 
  }
  .history-tl { 
    font-size: 4vw; 
    color: #4facfe; 
    font-weight: 700; 
  }
  button { 
    padding: 6px 14px; 
    font-size: 0.7rem; 
    background-color: #222; 
    color: white; 
    border: 1px solid #444; 
    border-radius: 20px; 
    cursor: pointer; 
    transition: all 0.3s ease; 
  }
  button:hover { 
    background-color: #4facfe; 
    border-color: #4facfe;
  }
  .recording { 
    animation: pulse 1.5s infinite; 
    background-color: #ff4757 !important; 
    border-color: #ff4757 !important;
  }
  @keyframes pulse { 
    0% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); } 
    70% { box-shadow: 0 0 0 15px rgba(255, 71, 87, 0); } 
    100% { box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); } 
  }
  .branding {
    position: fixed;
    bottom: 20px;
    font-size: 1rem;
    color: #444;
  }
</style>
</head>
<body>

<div id="main-wrapper">
  <div id="live-container">
    <div id="english-text">Waiting for speech...</div>
    <div id="translated-text">대기 중...</div>
    <div class="controls-row">
      <select id="lang-select">
        <option value="ko">Korean (한국어)</option>
        <option value="zh-CN">Chinese Simplified (简体中文)</option>
        <option value="zh-TW">Chinese Traditional (繁體中文)</option>
      </select>
      <button id="start-btn">Start Microphone</button>
    </div>
  </div>
  
  <div id="history-container">
    <!-- Past translations will appear here -->
  </div>
</div>

<div class="branding">live.counselorjay.com</div>

<script>
  const englishDiv = document.getElementById('english-text');
  const translatedDiv = document.getElementById('translated-text');
  const startBtn = document.getElementById('start-btn');
  const langSelect = document.getElementById('lang-select');
  const historyDiv = document.getElementById('history-container');

  let recognizing = false;
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  
  if (!SpeechRecognition) {
    translatedDiv.innerText = "Error: Please open this in Google Chrome.";
    startBtn.style.display = 'none';
  }

  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  async function translateText(text) {
    if (!text.trim()) return "";
    const targetLang = langSelect.value;
    try {
      const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
      const response = await fetch(url);
      const data = await response.json();
      return data[0].map(item => item[0]).join('');
    } catch (e) {
      console.error(e);
      return "Translation error.";
    }
  }

  let translationTimeout;
  let historyLines = [];

  function renderHistory() {
    historyDiv.innerHTML = "";
    // Reverse so the newest history is at the top of the history list (right under the live view)
    const displayList = [...historyLines].reverse();
    displayList.forEach(item => {
      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `<div class="history-en">${item.en}</div><div class="history-tl">${item.tl}</div>`;
      historyDiv.appendChild(div);
    });
  }

  async function processFinal(text) {
    if (!text.trim()) return;
    const translated = await translateText(text);
    historyLines.push({ en: text, tl: translated });
    if (historyLines.length > 4) historyLines.shift(); // Keep last 4 lines
    renderHistory();
  }

  langSelect.addEventListener('change', () => {
    // Clear history when switching languages to avoid mixed translation histories
    historyLines = [];
    renderHistory();
    if (!recognizing) {
      const waitingText = langSelect.value === 'ko' ? '대기 중...' : '等待中...';
      translatedDiv.innerText = waitingText;
    }
  });

  recognition.onresult = (event) => {
    let interim = '';

    for (let i = event.resultIndex; i < event.results.length; ++i) {
      if (event.results[i].isFinal) {
        processFinal(event.results[i][0].transcript);
      } else {
        interim += event.results[i][0].transcript;
      }
    }

    englishDiv.innerText = interim || (recognizing ? "..." : "Waiting for speech...");
    
    clearTimeout(translationTimeout);
    if (interim.trim().length > 0) {
      translationTimeout = setTimeout(async () => {
        const translated = await translateText(interim);
        translatedDiv.innerText = translated;
      }, 400); // 400ms delay for live preview
    } else {
      const waitingText = langSelect.value === 'ko' ? '대기 중...' : '等待中...';
      translatedDiv.innerText = recognizing ? "" : waitingText;
    }
  };

  recognition.onend = () => {
    if (recognizing) {
      try {
        recognition.start();
      } catch(e) {}
    }
  };

  startBtn.addEventListener('click', () => {
    if (recognizing) {
      recognition.stop();
      recognizing = false;
      startBtn.innerText = "Start Microphone";
      startBtn.classList.remove("recording");
      englishDiv.innerText = "Waiting for speech...";
      const waitingText = langSelect.value === 'ko' ? '대기 중...' : '等待中...';
      translatedDiv.innerText = waitingText;
    } else {
      recognition.start();
      recognizing = true;
      startBtn.innerText = "Stop Microphone";
      startBtn.classList.add("recording");
      englishDiv.innerText = "Listening...";
      translatedDiv.innerText = "";
    }
  });
</script>
</body>
</html>
